<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende a Programar: La Máquina de Café (Paso a Paso)</title>
    <style>
        :root {
            --bg-slate-100: #f1f5f9;
            --bg-white: #ffffff;
            --text-slate-800: #1e293b;
            --amber-700: #b45309;
            --blue-700: #1d4ed8;
            --green-400: #4ade80;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-slate-100);
            color: var(--text-slate-800);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header { text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        
        /* Controles */
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        select, input[type="range"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-toggle { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; cursor: pointer; }
        .btn-toggle.active { background: #fef3c7; border-color: #fcd34d; color: #92400e; font-weight: 600; }
        
        /* Taza y Animación */
        .cup-container { position: relative; width: 120px; height: 120px; margin: 30px auto; }
        .cup-body { 
            position: absolute; inset: 0; background: #f8fafc; border: 4px solid #cbd5e1; 
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            border-top-left-radius: 8px; border-top-right-radius: 8px;
            overflow: hidden; z-index: 10;
        }
        .liquid { 
            position: absolute; bottom: 0; width: 100%; height: 0%; 
            background: #3E2723; transition: height 0.5s ease;
        }
        .cup-handle { 
            position: absolute; top: 20%; right: -25px; width: 40px; height: 60px; 
            border: 4px solid #cbd5e1; border-radius: 0 20px 20px 0;
        }
        .drop {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 20px; background: #5d4037; border-radius: 50%;
            display: none; animation: drip 1s infinite;
        }
        @keyframes drip { 0% { top: -40px; opacity: 1; } 100% { top: 20px; opacity: 0; } }

        /* Botón Principal */
        .btn-brew {
            width: 100%; padding: 15px; background: #d97706; color: white; border: none;
            border-radius: 99px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: transform 0.1s, background 0.3s;
        }
        .btn-brew:active { transform: scale(0.95); }
        .btn-brew.next-step { background: #1d4ed8; }
        .btn-brew:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Código y Consola */
        .code-editor {
            background: #1e1e1e; color: #d1d5db; border-radius: 16px; overflow: hidden;
            font-family: 'Courier New', Courier, monospace; font-size: 14px;
        }
        .code-header { background: #2d2d2d; padding: 10px 15px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .code-content { padding: 20px; line-height: 1.6; position: relative; }
        .line { display: flex; gap: 15px; border-radius: 4px; border-left: 4px solid transparent; padding-left: 5px; }
        .line-num { color: #4b5563; width: 25px; text-align: right; user-select: none; }
        .line-text { white-space: pre; }
        .active-line { background: rgba(146, 64, 14, 0.4); border-left-color: #f59e0b; }
        
        .console {
            background: black; color: #4ade80; border-radius: 16px; margin-top: 20px;
            height: 180px; overflow-y: auto; padding: 15px; font-family: monospace;
        }
        .console-header { color: #94a3b8; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .log-entry { margin-bottom: 5px; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Colores de sintaxis */
        .keyword { color: #ec4899; }
        .function { color: #fde047; }
        .variable { color: #60a5fa; }
        .string { color: #4ade80; }
        .comment { color: #6b7280; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="font-size: 36px; margin-bottom: 10px;">☕ MaquinaDebugger</h1>
            <p>Aprende cómo avanza el flujo de un programa paso a paso.</p>
        </header>

        <div class="grid">
            <!-- PANEL IZQUIERDO -->
            <div>
                <div class="card">
                    <h2 style="color: var(--blue-700); font-size: 18px; margin-top: 0;">1. Configurar Entradas</h2>
                    
                    <label>Tipo de Grano</label>
                    <select id="grano" onchange="resetSim()">
                        <option value="Arábica Intenso">Arábica Intenso</option>
                        <option value="Robusta Suave" selected>Robusta Suave</option>
                        <option value="Descafeinado">Descafeinado</option>
                    </select>

                    <label>Agua - <span id="agua-val">250</span> ml</label>
                    <input type="range" id="agua" min="50" max="500" step="50" value="250" oninput="updateAguaLabel()">

                    <label>¿Con Leche?</label>
                    <div class="btn-group">
                        <button id="leche-true" class="btn-toggle active" onclick="setLeche(true)">Sí (True)</button>
                        <button id="leche-false" class="btn-toggle" onclick="setLeche(false)">No (False)</button>
                    </div>
                </div>

                <div class="card" style="text-align: center;">
                    <div class="cup-container">
                        <div class="drop" id="drop"></div>
                        <div class="cup-body">
                            <div class="liquid" id="liquid"></div>
                        </div>
                        <div class="cup-handle"></div>
                    </div>
                    <button class="btn-brew" id="main-button" onclick="handleButtonClick()">INICIAR PREPARACIÓN</button>
                    <p style="font-size: 12px; color: #64748b; margin-top: 15px;" id="status-hint">Configura las variables y pulsa Iniciar.</p>
                </div>
            </div>

            <!-- PANEL DERECHO -->
            <div>
                <div class="code-editor">
                    <div class="code-header">
                        <div class="dot" style="background: #ff5f56;"></div>
                        <div class="dot" style="background: #ffbd2e;"></div>
                        <div class="dot" style="background: #27c93f;"></div>
                        <span style="font-size: 12px; margin-left: 10px;">maquina_paso_a_paso.py</span>
                    </div>
                    <div class="code-content" id="code-list"></div>
                </div>

                <div class="console">
                    <div class="console-header">Consola de depuración</div>
                    <div id="logs-container">
                        <div class="log-entry" style="color: #4b5563;">Esperando inicio...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ESTADO GLOBAL
        let grano = "Robusta Suave";
        let agua = 250;
        let leche = true;
        let currentStepId = -1; // -1: no iniciado, 0-N: pasos
        const logsContainer = document.getElementById('logs-container');
        const mainButton = document.getElementById('main-button');
        const statusHint = document.getElementById('status-hint');

        // DEFINICIÓN DE PASOS (Secuencia de ejecución de Python)
        function getSteps() {
            const sequence = [
                { line: 16, log: "Definiendo variable 'grano_elegido'" },
                { line: 17, log: "Definiendo variable 'agua_ml'" },
                { line: 18, log: "Definiendo variable 'leche_bool'" },
                { line: 21, log: "Llamando a la función preparar_cafe()..." },
                { line: 1, log: "Entrando en la función..." },
                { line: 3, log: "--- Iniciando " + grano + " ---" },
                { line: 4, log: "Calentando " + agua + "ml de agua...", fill: 35 },
                { line: 6, log: "Evaluando condicional if..." }
            ];

            if (leche) {
                sequence.push({ line: 7, log: "Condición True: Agregando leche 🥛", fill: 70, color: "#A67B5B" });
                sequence.push({ line: 8, log: "Asignando resultado = 'Cortado'", fill: 100 });
            } else {
                sequence.push({ line: 10, log: "Condición False: Saltando al else...", wait: 200 });
                sequence.push({ line: 11, log: "Asignando resultado = 'Negro'", fill: 100 });
            }

            sequence.push({ line: 13, log: "Saliendo de la función con return..." });
            sequence.push({ line: 22, log: "Listo: " + (leche ? "Cortado" : "Negro") });
            
            return sequence;
        }

        let currentSequence = [];

        function renderCode(activeLine = null) {
            const container = document.getElementById('code-list');
            const lines = [
                "<span class='keyword'>def</span> <span class='function'>preparar_cafe</span>(grano, agua, con_leche):",
                "    <span class='comment'>\"\"\" Simulación de máquina de café \"\"\"</span>",
                "    <span class='function'>print</span>(<span class='string'>\"Iniciando preparación...\"</span>)",
                "    <span class='function'>print</span>(<span class='string'>\"Calentando agua...\"</span>)",
                "    ",
                "    <span class='keyword'>if</span> con_leche == <span class='keyword'>True</span>:",
                "        <span class='function'>print</span>(<span class='string'>\"Agregando leche 🥛\"</span>)",
                "        resultado = <span class='string'>\"Cortado\"</span>",
                "    <span class='keyword'>else</span>:",
                "        <span class='function'>print</span>(<span class='string'>\"Sirviendo café solo ☕\"</span>)",
                "        resultado = <span class='string'>\"Negro\"</span>",
                "    ",
                "    <span class='keyword'>return</span> resultado",
                "",
                "<span class='comment'># 1. Variables</span>",
                "<span class='variable'>grano_elegido</span> = <span class='string'>\"" + grano + "\"</span>",
                "<span class='variable'>agua_ml</span> = <span class='keyword'>" + agua + "</span>",
                "<span class='variable'>leche_bool</span> = <span class='keyword'>" + (leche ? 'True' : 'False') + "</span>",
                "",
                "<span class='comment'># 2. Llamada a la función</span>",
                "<span class='variable'>mi_taza</span> = <span class='function'>preparar_cafe</span>(grano_elegido, agua_ml, leche_bool)",
                "<span class='function'>print</span>(<span class='string'>\"Listo: \"</span>, <span class='variable'>mi_taza</span>)"
            ];

            container.innerHTML = lines.map((line, i) => `
                <div class="line ${activeLine === i + 1 ? 'active-line' : ''}">
                    <span class="line-num">${i + 1}</span>
                    <span class="line-text">${line}</span>
                </div>
            `).join('');
        }

        function updateAguaLabel() {
            agua = document.getElementById('agua').value;
            document.getElementById('agua-val').innerText = agua;
            resetSim();
        }

        function setLeche(val) {
            leche = val;
            document.getElementById('leche-true').classList.toggle('active', val);
            document.getElementById('leche-false').classList.toggle('active', !val);
            resetSim();
        }

        function resetSim() {
            currentStepId = -1;
            grano = document.getElementById('grano').value;
            renderCode();
            logsContainer.innerHTML = "<div class='log-entry' style='color: #4b5563;'>Depurador listo. Pulsa Iniciar.</div>";
            document.getElementById('liquid').style.height = "0%";
            document.getElementById('liquid').style.backgroundColor = "#3E2723";
            mainButton.innerText = "INICIAR PREPARACIÓN";
            mainButton.classList.remove('next-step');
            statusHint.innerText = "Configura las variables y pulsa Iniciar.";
        }

        async function handleButtonClick() {
            if (currentStepId === -1) {
                // Iniciar
                currentStepId = 0;
                currentSequence = getSteps();
                logsContainer.innerHTML = "";
                mainButton.innerText = "Siguiente Paso ➔";
                mainButton.classList.add('next-step');
                statusHint.innerText = "Pulsa el botón para ejecutar la siguiente línea.";
            }

            if (currentStepId < currentSequence.length) {
                const step = currentSequence[currentStepId];
                
                // Ejecutar paso
                renderCode(step.line);
                if (step.log) {
                    const div = document.createElement('div');
                    div.className = "log-entry";
                    div.innerHTML = `<span style="color: #64748b;">[Línea ${step.line}]</span> > ${step.log}`;
                    logsContainer.appendChild(div);
                    logsContainer.parentElement.scrollTop = logsContainer.parentElement.scrollHeight;
                }

                if (step.fill) {
                    document.getElementById('drop').style.display = "block";
                    document.getElementById('liquid').style.height = step.fill + "%";
                    if (step.color) document.getElementById('liquid').style.backgroundColor = step.color;
                    setTimeout(() => { document.getElementById('drop').style.display = "none"; }, 500);
                }

                currentStepId++;
                
                if (currentStepId === currentSequence.length) {
                    mainButton.innerText = "REINICIAR";
                    statusHint.innerText = "Preparación terminada. Pulsa para configurar de nuevo.";
                }
            } else {
                // Reiniciar
                resetSim();
            }
        }

        // Inicio inicial
        renderCode();
    </script>
</body>
</html>
