<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende a Programar: La Máquina de Café</title>
    <style>
        :root {
            --bg-slate-100: #f1f5f9;
            --bg-white: #ffffff;
            --text-slate-800: #1e293b;
            --amber-700: #b45309;
            --blue-700: #1d4ed8;
            --green-400: #4ade80;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-slate-100);
            color: var(--text-slate-800);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header { text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px border #e2e8f0;
            margin-bottom: 20px;
        }
        
        /* Controles */
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        select, input[type="range"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-toggle { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; cursor: pointer; }
        .btn-toggle.active { background: #fef3c7; border-color: #fcd34d; color: #92400e; font-weight: 600; }
        
        /* Taza y Animación */
        .cup-container { position: relative; width: 120px; height: 120px; margin: 30px auto; }
        .cup-body { 
            position: absolute; inset: 0; background: #f8fafc; border: 4px solid #cbd5e1; 
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            border-top-left-radius: 8px; border-top-right-radius: 8px;
            overflow: hidden; z-index: 10;
        }
        .liquid { 
            position: absolute; bottom: 0; width: 100%; height: 0%; 
            background: #3E2723; transition: height 0.5s ease;
        }
        .cup-handle { 
            position: absolute; top: 20%; right: -25px; width: 40px; height: 60px; 
            border: 4px solid #cbd5e1; border-radius: 0 20px 20px 0;
        }
        .drop {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 20px; background: #5d4037; border-radius: 50%;
            display: none; animation: drip 1s infinite;
        }
        @keyframes drip { 0% { top: -40px; opacity: 1; } 100% { top: 20px; opacity: 0; } }

        /* Botón Principal */
        .btn-brew {
            width: 100%; padding: 15px; background: #d97706; color: white; border: none;
            border-radius: 99px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .btn-brew:active { transform: scale(0.95); }
        .btn-brew:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Código y Consola */
        .code-editor {
            background: #1e1e1e; color: #d1d5db; border-radius: 16px; overflow: hidden;
            font-family: 'Courier New', Courier, monospace; font-size: 14px;
        }
        .code-header { background: #2d2d2d; padding: 10px 15px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .code-content { padding: 20px; line-height: 1.6; position: relative; }
        .line { display: flex; gap: 15px; border-radius: 4px; border-left: 4px solid transparent; padding-left: 5px; }
        .line-num { color: #4b5563; width: 25px; text-align: right; user-select: none; }
        .active-line { background: rgba(146, 64, 14, 0.3); border-left-color: #f59e0b; }
        
        .console {
            background: black; color: #4ade80; border-radius: 16px; margin-top: 20px;
            height: 180px; overflow-y: auto; padding: 15px; font-family: monospace;
        }
        .console-header { color: #94a3b8; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .log-entry { margin-bottom: 5px; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Colores de sintaxis */
        .keyword { color: #ec4899; }
        .function { color: #fde047; }
        .variable { color: #60a5fa; }
        .string { color: #4ade80; }
        .comment { color: #6b7280; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="font-size: 36px; margin-bottom: 10px;">☕ La Máquina de Café</h1>
            <p>Aprende Programación (Variables, Funciones y Condicionales) interactuando.</p>
        </header>

        <div class="grid">
            <!-- PANEL IZQUIERDO -->
            <div>
                <div class="card">
                    <h2 style="color: var(--blue-700); font-size: 18px; margin-top: 0;">1. Variables (Ingredientes)</h2>
                    
                    <label>Tipo de Grano (Texto / String)</label>
                    <select id="grano" onchange="updateVariables()">
                        <option value="Arábica Intenso">Arábica Intenso</option>
                        <option value="Robusta Suave" selected>Robusta Suave</option>
                        <option value="Descafeinado">Descafeinado</option>
                    </select>

                    <label>Agua (Número / Int) - <span id="agua-val">250</span> ml</label>
                    <input type="range" id="agua" min="50" max="500" step="50" value="250" oninput="updateVariables()">

                    <label>¿Con Leche? (Booleano / Boolean)</label>
                    <div class="btn-group">
                        <button id="leche-true" class="btn-toggle active" onclick="setLeche(true)">Sí (True)</button>
                        <button id="leche-false" class="btn-toggle" onclick="setLeche(false)">No (False)</button>
                    </div>
                </div>

                <div class="card" style="text-align: center;">
                    <h2 style="color: var(--amber-700); font-size: 18px; margin-top: 0;">2. Función (La Máquina)</h2>
                    <div class="cup-container">
                        <div class="drop" id="drop"></div>
                        <div class="cup-body">
                            <div class="liquid" id="liquid"></div>
                        </div>
                        <div class="cup-handle"></div>
                    </div>
                    <button class="btn-brew" id="btn-brew" onclick="prepararCafe()">¡EJECUTAR FUNCIÓN!</button>
                </div>
            </div>

            <!-- PANEL DERECHO -->
            <div>
                <div class="code-editor">
                    <div class="code-header">
                        <div class="dot" style="background: #ff5f56;"></div>
                        <div class="dot" style="background: #ffbd2e;"></div>
                        <div class="dot" style="background: #27c93f;"></div>
                        <span style="font-size: 12px; margin-left: 10px;">maquina.py</span>
                    </div>
                    <div class="code-content" id="code-list">
                        <!-- Las líneas de código se generan aquí -->
                    </div>
                </div>

                <div class="console">
                    <div class="console-header">Consola de salida</div>
                    <div id="logs-container">
                        <div class="log-entry" style="color: #4b5563;">Esperando ejecución...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ESTADO GLOBAL
        let grano = "Robusta Suave";
        let agua = 250;
        let leche = true;
        let isBrewing = false;

        const codeLines = [
            "<span class='keyword'>def</span> <span class='function'>preparar_cafe</span>(tipo_grano, cantidad_agua, con_leche):",
            "    <span class='comment'>\"\"\" Simulación de máquina de café \"\"\"</span>",
            "    <span class='function'>print</span>(f<span class='string'>\"--- Preparando {tipo_grano} ---\"</span>)",
            "    <span class='function'>print</span>(f<span class='string'>\"Calentando {cantidad_agua} ml de agua...\"</span>)",
            "    ",
            "    <span class='keyword'>if</span> con_leche == <span class='keyword'>True</span>:",
            "        <span class='function'>print</span>(<span class='string'>\"Agregando espuma de leche 🥛\"</span>)",
            "        resultado = <span class='string'>\"Cortado\"</span>",
            "    <span class='keyword'>else</span>:",
            "        <span class='function'>print</span>(<span class='string'>\"Sirviendo café solo ☕\"</span>)",
            "        resultado = <span class='string'>\"Negro\"</span>",
            "        ",
            "    <span class='keyword'>return</span> resultado",
            "",
            "<span class='comment'># Definición de variables de entrada</span>",
            "<span class='variable'>ingrediente</span> = <span class='string'>\"" + grano + "\"</span>",
            "<span class='variable'>ml_agua</span> = <span class='string'>" + agua + "</span>",
            "<span class='variable'>quiere_leche</span> = " + (leche ? "<span class='keyword'>True</span>" : "<span class='keyword'>False</span>"),
            "",
            "<span class='comment'># Llamada a la función</span>",
            "<span class='variable'>taza_final</span> = <span class='function'>preparar_cafe</span>(ingrediente, ml_agua, quiere_leche)",
            "<span class='function'>print</span>(<span class='string'>\"Cliente recibe:\"</span>, <span class='variable'>taza_final</span>)"
        ];

        function renderCode(active = null) {
            const container = document.getElementById('code-list');
            let html = "";
            const currentLines = [
                "<span class='keyword'>def</span> <span class='function'>preparar_cafe</span>(grano, agua, con_leche):",
                "    <span class='comment'>\"\"\" Simulación de máquina de café \"\"\"</span>",
                "    <span class='function'>print</span>(<span class='string'>\"Iniciando preparación...\"</span>)",
                "    <span class='function'>print</span>(<span class='string'>\"Calentando agua...\"</span>)",
                "    ",
                "    <span class='keyword'>if</span> con_leche == <span class='keyword'>True</span>:",
                "        <span class='function'>print</span>(<span class='string'>\"Agregando leche 🥛\"</span>)",
                "        resultado = <span class='string'>\"Cortado\"</span>",
                "    <span class='keyword'>else</span>:",
                "        <span class='keyword'>else:</span>",
                "        resultado = <span class='string'>\"Negro\"</span>",
                "    ",
                "    <span class='keyword'>return</span> resultado",
                "",
                "<span class='comment'># 1. Variables</span>",
                "<span class='variable'>grano_elegido</span> = <span class='string'>\"" + grano + "\"</span>",
                "<span class='variable'>agua_ml</span> = <span class='keyword'>" + agua + "</span>",
                "<span class='variable'>leche_bool</span> = <span class='keyword'>" + (leche ? 'True' : 'False') + "</span>",
                "",
                "<span class='comment'># 2. Ejecutar función</span>",
                "<span class='variable'>mi_taza</span> = <span class='function'>preparar_cafe</span>(grano_elegido, agua_ml, leche_bool)",
                "<span class='function'>print</span>(<span class='string'>\"Listo: \"</span>, <span class='variable'>mi_taza</span>)"
            ];

            currentLines.forEach((line, i) => {
                const isAct = (active === i + 1);
                html += `<div class="line ${isAct ? 'active-line' : ''}">
                    <span class="line-num">${i + 1}</span>
                    <span class="line-text">${line}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        function updateVariables() {
            if (isBrewing) return;
            grano = document.getElementById('grano').value;
            agua = document.getElementById('agua').value;
            document.getElementById('agua-val').innerText = agua;
            renderCode();
        }

        function setLeche(val) {
            if (isBrewing) return;
            leche = val;
            document.getElementById('leche-true').classList.toggle('active', val);
            document.getElementById('leche-false').classList.toggle('active', !val);
            renderCode();
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function prepararCafe() {
            if (isBrewing) return;
            isBrewing = true;
            document.getElementById('btn-brew').disabled = true;
            document.getElementById('btn-brew').innerText = "Procesando...";
            const logs = document.getElementById('logs-container');
            logs.innerHTML = "";
            document.getElementById('liquid').style.height = "0%";
            document.getElementById('liquid').style.backgroundColor = "#3E2723";

            const addLog = (txt) => {
                const div = document.createElement('div');
                div.className = "log-entry";
                div.innerHTML = `> ${txt}`;
                logs.appendChild(div);
                logs.parentElement.scrollTop = logs.parentElement.scrollHeight;
            };

            const steps = [
                { line: 21, log: null, wait: 600 },
                { line: 1, log: null, wait: 600 },
                { line: 3, log: "Iniciando preparación de " + grano, wait: 800 },
                { line: 4, log: "Calentando " + agua + "ml de agua...", wait: 1000, fill: 30 },
                { line: 6, log: null, wait: 600 }
            ];

            if (leche) {
                steps.push({ line: 7, log: "Agregando leche caliente 🥛", wait: 1000, fill: 70, color: "#A67B5B" });
                steps.push({ line: 8, log: null, wait: 600, fill: 100 });
            } else {
                steps.push({ line: 9, log: null, wait: 500 });
                steps.push({ line: 11, log: "Sirviendo café negro intenso ☕", wait: 1000, fill: 100 });
            }

            steps.push({ line: 13, log: "Proceso interno terminado", wait: 800 });
            steps.push({ line: 22, log: "Cliente recibe: " + (leche ? "Café Cortado" : "Café Negro"), wait: 500 });

            for (let s of steps) {
                renderCode(s.line);
                if (s.log) addLog(s.log);
                if (s.fill) {
                    document.getElementById('drop').style.display = "block";
                    document.getElementById('liquid').style.height = s.fill + "%";
                    if (s.color) document.getElementById('liquid').style.backgroundColor = s.color;
                    await sleep(s.wait);
                    document.getElementById('drop').style.display = "none";
                } else {
                    await sleep(s.wait);
                }
            }

            renderCode(null);
            isBrewing = false;
            document.getElementById('btn-brew').disabled = false;
            document.getElementById('btn-brew').innerText = "¡EJECUTAR FUNCIÓN!";
        }

        // Inicio
        renderCode();
    </script>
</body>
</html>
